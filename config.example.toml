# claudemeji config - copy to ~/.claudemeji/config.toml and edit

[sprite_pack]
# path to your shimeji sprite pack folder
path = "~/shimejis/my_pack"
# spritesheet filename within that folder
sheet = "shime1.png"
# frame dimensions in pixels
frame_width = 128
frame_height = 128

# --- action definitions ---
# define animations using 0-indexed frame numbers from the spritesheet
# (vertical strip assumed by default: frame 0 = top, frame 1 = next row down, etc.)
# fps = frames per second
# loop = true loops forever, false plays once then transitions to next_action

[actions.sit_idle]
frames = [0, 1]
fps = 3
loop = true

[actions.walk_left]
frames = [2, 3, 4, 5]
fps = 8
loop = true

[actions.walk_right]
frames = [6, 7, 8, 9]
fps = 8
loop = true

[actions.fall]
frames = [10, 11]
fps = 12
loop = true

[actions.think]
frames = [12, 13, 14]
fps = 4
loop = true

[actions.read]
frames = [15, 16]
fps = 3
loop = true

[actions.type]
frames = [17, 18, 19]
fps = 10
loop = true

[actions.run]
frames = [20, 21, 22]
fps = 6
loop = true

[actions.wait]
frames = [23, 24]
fps = 2
loop = true

[actions.react_good]
frames = [25, 26, 27, 28]
fps = 10
loop = false
next_action = "sit_idle"

[actions.react_bad]
frames = [29, 30, 31]
fps = 8
loop = false
next_action = "sit_idle"

# --- action aliases ---
# if your sprite pack doesn't have all actions defined above,
# map our canonical names to whatever animation fits best

[action_aliases]
# example: if your pack only has a generic "idle" but not "wait"
# wait = "sit_idle"
# think = "sit_idle"
